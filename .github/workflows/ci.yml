name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "apply-report.json"
      - "repair-apply-report.json"
      - "docs/repair/README.md"
      - "jobs/**"
      - "records/**"
      - "results/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: pnpm check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Run check
        run: pnpm run check
